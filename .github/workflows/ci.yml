name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frequency
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frequency/package-lock.json
      - run: npm ci
      - run: npm test
      - run: npm run build

      # backend (separate package — Express API for Render)
      - run: npm ci
        working-directory: frequency/server
      - run: npm test
        working-directory: frequency/server
